<script>
AOS.init({
once: false,
mirror: true,
duration: 800,
easing: 'ease-out-cubic'
});
</script>

<script>
const interactiveContainers = document.querySelectorAll('.js-interactive-container');

interactiveContainers.forEach(container => {
const updateGlowPosition = (clientX, clientY) => {
const rect = container.getBoundingClientRect();
const x = clientX - rect.left;
const y = clientY - rect.top;
container.style.setProperty('--mx', `${x}px`);
container.style.setProperty('--my', `${y}px`);
};

container.addEventListener('mousemove', (e) => updateGlowPosition(e.clientX, e.clientY));
container.addEventListener('pointerdown', (e) => updateGlowPosition(e.clientX, e.clientY));
container.addEventListener('touchmove', (e) => {
const touch = e.touches[0];
if (touch) updateGlowPosition(touch.clientX, touch.clientY);
});
});
</script>

<script>
(function () {
const DEFAULT_HTML = `<h1>Hello, world!</h1>
<p>Edit the HTML, CSS, and JS boxes above and watch the preview update.</p>
<button id="demo-btn">Click me</button>`;

const DEFAULT_CSS = `body {
  font-family: sans-serif;
  padding: 24px;
  color: #222;
}

button {
  padding: 10px 18px;
  border: none;
  border-radius: 8px;
  background: #1E56E0;
  color: white;
  font-weight: 600;
  cursor: pointer;
}`;

const DEFAULT_JS = `document.getElementById('demo-btn').addEventListener('click', () => {
  alert('Hello from your code!');
});`;

const htmlBox = document.getElementById('html-code');
const cssBox = document.getElementById('css-code');
const jsBox = document.getElementById('js-code');
const frame = document.getElementById('preview-frame');
const runBtn = document.getElementById('run-btn');
const resetBtn = document.getElementById('reset-btn');

function loadDefaults() {
htmlBox.value = DEFAULT_HTML;
cssBox.value = DEFAULT_CSS;
jsBox.value = DEFAULT_JS;
}

function runCode() {
const doc = `<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>${cssBox.value}</style>
</head>
<body>
${htmlBox.value}
<script>
try {
${jsBox.value}
} catch (err) {
document.body.insertAdjacentHTML('beforeend', '<pre style="color:#c0392b;white-space:pre-wrap;font-family:monospace;margin-top:16px;">' + err + '</pre>');
}
<\/script>
</body>
</html>`;
frame.srcdoc = doc;
}

let debounceTimer;
function scheduleRun() {
clearTimeout(debounceTimer);
debounceTimer = setTimeout(runCode, 400);
}

loadDefaults();
runCode();

[htmlBox, cssBox, jsBox].forEach((box) => {
box.addEventListener('input', scheduleRun);
box.addEventListener('keydown', (e) => {
if (e.key === 'Tab') {
e.preventDefault();
const start = box.selectionStart;
const end = box.selectionEnd;
box.value = box.value.substring(0, start) + '  ' + box.value.substring(end);
box.selectionStart = box.selectionEnd = start + 2;
scheduleRun();
}
});
});

runBtn.addEventListener('click', runCode);
resetBtn.addEventListener('click', () => {
loadDefaults();
runCode();
});
})();
</script>
