name: Lint Code

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is master
  pull_request:
    branches: ["main"]

jobs:
  html-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run HTMLHint Linter
        run: npx htmlhint "**/*.html" --rules "doctype-first=false"
